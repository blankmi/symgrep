name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_ref:
        description: "Git ref to build (tag, branch, or SHA). Leave empty for current ref."
        required: false
        default: ""
      release_tag:
        description: "Optional tag name to publish (for manual runs), e.g. v1.2.3."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make_target: build-linux-amd64
            artifact_name: symgrep-linux-amd64
            artifact_path: bin/symgrep-linux-amd64
          - os: macos-latest
            make_target: build-darwin-amd64
            artifact_name: symgrep-darwin-amd64
            artifact_path: bin/symgrep-darwin-amd64
          - os: macos-latest
            make_target: build-darwin-arm64
            artifact_name: symgrep-darwin-arm64
            artifact_path: bin/symgrep-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref != '' && inputs.build_ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Binary
        run: make ${{ matrix.make_target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum symgrep-linux-amd64/symgrep-linux-amd64 symgrep-darwin-amd64/symgrep-darwin-amd64 symgrep-darwin-arm64/symgrep-darwin-arm64 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: ${{ inputs.build_ref != '' && inputs.build_ref || github.sha }}
          generate_release_notes: true
          files: |
            dist/symgrep-linux-amd64/symgrep-linux-amd64
            dist/symgrep-darwin-amd64/symgrep-darwin-amd64
            dist/symgrep-darwin-arm64/symgrep-darwin-arm64
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
